server {
    listen 80;

    # Basic auth — all routes protected
    auth_basic           "LineageMap";
    auth_basic_user_file /etc/nginx/.htpasswd;

    # /api/reload is called by CI with a Bearer token, not basic auth.
    # Allow it through without prompting for a password in the browser.
    location /api/reload {
        auth_basic off;
        proxy_pass http://lineagemap:3000;
    }

    location / {
        proxy_pass         http://lineagemap:3000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
    }
}
